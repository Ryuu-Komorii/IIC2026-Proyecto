<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valorant · Pick rates por año</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="viz-card">
        <header class="viz-header">
          <h1>Los 3 agentes más elegidos de Valorant por año en el competitivo.</h1>
        </header>

        <section class="viz-main">
          <section class="overall-panel" aria-labelledby="overall-title">
            <h2 id="overall-title" class="sr-only">Top 3 general</h2>
            <div id="overallBubbles" class="overall-bubbles"></div>
          </section>

          <section class="timeline-panel" aria-labelledby="timeline-title">
            <h2 id="timeline-title" class="sr-only">Línea de tiempo</h2>
            <div class="timeline-line" aria-hidden="true">
              <span class="line-core"></span>
              <span class="arrow right"></span>
            </div>
            <div id="yearNodes" class="year-nodes" aria-hidden="true"></div>
            <div id="timelineYears" class="timeline-years"></div>
          </section>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
